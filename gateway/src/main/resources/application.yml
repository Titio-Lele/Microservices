spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: log-service
          uri: lb://log
          predicates:
            - Path=/gateway/log/**
          filters:
            - StripPrefix=2
server:
  port: 8080

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8081/eureka
    fetch-registry: true
    register-with-eureka: true
